spring.application.name=libros

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Base de datos H2 persistente en archivo
spring.datasource.url=jdbc:h2:file:/home/cohorte6/Desktop/SpringBoot-practicas/week2/data/librotech_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# IA de demo
langchain4j.open-ai.chat-model.api-key=demo
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.3
langchain4j.open-ai.chat-model.timeout=PT30S
