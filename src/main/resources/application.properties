spring.application.name=Librotech

# ===== FLYWAY =====
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===== HIBERNATE: Delegamos el esquema a Flyway =====
spring.jpa.hibernate.ddl-auto=validate

# ===== AUDITORÍA SQL EN CONSOLA =====
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Docker
spring.docker.compose.enabled=false




# =====================================================
# DATASOURCE (H2 FILE MODE)
# =====================================================

# Guarda físicamente la DB en ./data/librotech
spring.datasource.url=jdbc:h2:file:./data/librotech

# Credenciales H2
spring.datasource.username=sa
spring.datasource.password=

# Driver
spring.datasource.driver-class-name=org.h2.Driver

# =====================================================
# H2 CONSOLE
# =====================================================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
